<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Softshot Overlay</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <img id="screen-image" alt="" draggable="false" />
    <canvas id="annotation-canvas"></canvas>
    <div id="recording-hud" class="recording-hud" hidden>
      <span class="recording-spinner" aria-hidden="true"></span>
      <span id="recording-timer" class="recording-timer">00:00</span>
    </div>
    <div id="countdown-badge" class="countdown-badge" hidden>3</div>

    <div id="capture-toolbar" class="toolbar" role="toolbar" aria-label="Softshot capture tools">
      <button id="screenshot-button" class="tool-button active" type="button" title="Screenshot" aria-label="Screenshot">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 7.5 9.4 5h5.2L16 7.5h2.5A2.5 2.5 0 0 1 21 10v7.5a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5V10a2.5 2.5 0 0 1 2.5-2.5H8Z" />
          <circle cx="12" cy="13.5" r="3.6" />
        </svg>
      </button>

      <button id="video-button" class="tool-button video-button" type="button" title="Video" aria-label="Video" data-state="video">
        <span class="video-icon active" data-video-icon="video" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="6" width="12" height="12" rx="2.5" />
            <path d="m15.5 10 5-3v10l-5-3Z" />
          </svg>
        </span>
        <span class="video-icon" data-video-icon="start" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M8 5.5v13l10-6.5Z" />
          </svg>
        </span>
        <span class="video-icon" data-video-icon="stop" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <rect x="7" y="7" width="10" height="10" rx="1.8" />
          </svg>
        </span>
      </button>

      <button id="pen-button" class="tool-button with-swatch" type="button" title="Pen" aria-label="Pen">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m4 20 4.4-1 9.9-9.9-3.4-3.4L5 15.6 4 20Z" />
          <path d="m13.4 7.2 3.4 3.4" />
          <path d="m16 4.6 1.1-1.1a1.8 1.8 0 0 1 2.6 0l.8.8a1.8 1.8 0 0 1 0 2.6L19.4 8" />
        </svg>
        <span class="color-swatch" aria-hidden="true"></span>
      </button>

      <button id="arrow-button" class="tool-button with-swatch" type="button" title="Arrow" aria-label="Arrow">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 19 18.5 5.5" />
          <path d="M10.5 5.5h8v8" />
        </svg>
        <span class="color-swatch" aria-hidden="true"></span>
      </button>

      <button id="color-button" class="tool-button dropdown-button" type="button" title="Color" aria-label="Color">
        <span class="large-swatch" aria-hidden="true"></span>
      </button>

      <button id="settings-button" class="tool-button dropdown-button" type="button" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3" />
          <path d="M12 3.5v3" />
          <path d="M12 17.5v3" />
          <path d="m5.9 5.9 2.1 2.1" />
          <path d="m16 16 2.1 2.1" />
          <path d="M3.5 12h3" />
          <path d="M17.5 12h3" />
          <path d="m5.9 18.1 2.1-2.1" />
          <path d="m16 8 2.1-2.1" />
        </svg>
      </button>

      <button id="close-button" class="tool-button" type="button" title="Close" aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6 18 18" />
          <path d="M18 6 6 18" />
        </svg>
      </button>

      <div id="color-menu" class="menu color-menu" hidden>
        <button class="color-choice selected" type="button" data-color="#38bdf8" style="--choice-color: #38bdf8" aria-label="Blue"></button>
        <button class="color-choice" type="button" data-color="#f43f5e" style="--choice-color: #f43f5e" aria-label="Red"></button>
        <button class="color-choice" type="button" data-color="#facc15" style="--choice-color: #facc15" aria-label="Yellow"></button>
        <button class="color-choice" type="button" data-color="#22c55e" style="--choice-color: #22c55e" aria-label="Green"></button>
        <button class="color-choice" type="button" data-color="#ffffff" style="--choice-color: #ffffff" aria-label="White"></button>
      </div>

      <div id="settings-menu" class="menu settings-menu" hidden>
        <div class="menu-section">
          <button class="menu-choice" type="button" data-quality="720p">720p</button>
          <button class="menu-choice selected" type="button" data-quality="1080p">1080p</button>
        </div>
        <div class="menu-section">
          <button class="menu-choice" type="button" data-fps="30">30fps</button>
          <button class="menu-choice selected" type="button" data-fps="60">60fps</button>
        </div>
      </div>
    </div>

    <script type="module" src="../dist/overlay.js"></script>
  </body>
</html>
