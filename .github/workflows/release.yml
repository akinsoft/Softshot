name: Build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Package
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run package -- --publish never

      - name: Publish Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: softshot-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error
