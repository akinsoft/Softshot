<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Softshot trimming a Minecraft recording in Windows</title>
  <desc id="desc">The actual Softshot editor layout around a Minecraft gameplay capture with trim and audio controls.</desc>
  <defs>
    <filter id="window-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#202b34" flood-opacity="0.38"/>
    </filter>
    <filter id="video-shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="15" stdDeviation="13" flood-color="#000" flood-opacity="0.34"/>
    </filter>
    <linearGradient id="audio-level" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <clipPath id="video-clip">
      <rect x="280" y="122" width="720" height="405"/>
    </clipPath>
  </defs>

  <rect width="1280" height="720" fill="#d5dbe1"/>
  <rect y="672" width="1280" height="48" fill="#eef2f6" fill-opacity="0.97"/>
  <line x1="0" y1="672" x2="1280" y2="672" stroke="#bac3cc"/>
  <g transform="translate(604 684)" fill="#2a6fd6">
    <rect width="13" height="13" rx="1"/><rect x="16" width="13" height="13" rx="1"/>
    <rect y="16" width="13" height="13" rx="1"/><rect x="16" y="16" width="13" height="13" rx="1"/>
  </g>
  <circle cx="662" cy="698" r="10" fill="#f7c844"/><circle cx="698" cy="698" r="10" fill="#3c82df"/>

  <g filter="url(#window-shadow)">
    <rect x="190" y="52" width="900" height="616" rx="9" fill="#202224" stroke="#fff" stroke-opacity="0.16"/>
    <path d="M190 61a9 9 0 0 1 9-9h882a9 9 0 0 1 9 9v39H190Z" fill="#111214"/>
    <line x1="190" y1="100" x2="1090" y2="100" stroke="#fff" stroke-opacity="0.08"/>

    <g transform="translate(204 62)">
      <rect width="28" height="28" rx="6" fill="#38bdf8"/>
      <path d="M7 11h14v10H7Z" fill="none" stroke="#071116" stroke-width="2"/>
      <circle cx="14" cy="16" r="3.2" fill="none" stroke="#071116" stroke-width="2"/>
      <path d="m10 11 1.5-3h5l1.5 3" fill="none" stroke="#071116" stroke-width="2" stroke-linejoin="round"/>
    </g>
    <text x="246" y="80" fill="#aeb8be" font-family="Segoe UI, system-ui, sans-serif" font-size="12">Hardware encoded</text>
    <g transform="translate(596 59)" fill="none" stroke="#f4f7fb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect width="34" height="34" rx="7" fill="#1a1d20" stroke="none"/><rect x="12" y="12" width="14" height="16" rx="2"/><path d="M9 24H8a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3h13a3 3 0 0 1 3 3v2"/>
    </g>
    <g transform="translate(636 59)" fill="none" stroke="#f4f7fb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect width="34" height="34" rx="7" fill="#1a1d20" stroke="none"/><path d="M8 6h17l3 3v19H8Z"/><path d="M12 6v9h12V6M12 24h12"/>
    </g>
    <g transform="translate(1046 59)" fill="none" stroke="#f4f7fb" stroke-width="1.8" stroke-linecap="round">
      <rect width="34" height="34" rx="7" fill="#2b181a" stroke="none"/><path d="m10 10 14 14m0-14L10 24"/>
    </g>

    <g clip-path="url(#video-clip)" filter="url(#video-shadow)">
      <image href="recording-gameplay.png" x="280" y="122" width="720" height="405" preserveAspectRatio="xMidYMid slice"/>
      <rect x="280" y="122" width="720" height="405" fill="none" stroke="#fff" stroke-opacity="0.08"/>
    </g>

    <g font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-variant-numeric="tabular-nums">
      <text x="605" y="559" fill="#fff" text-anchor="end">00:01.84</text>
      <text x="616" y="559" fill="#7f898f">/</text>
      <text x="636" y="559" fill="#fff">00:03.00</text>
    </g>

    <rect x="212" y="576" width="856" height="54" rx="8" fill="#111214" fill-opacity="0.74" stroke="#fff" stroke-opacity="0.1"/>
    <rect x="224" y="587" width="32" height="32" rx="7" fill="#fff" fill-opacity="0.06"/>
    <path d="m236 595 12 8-12 8Z" fill="none" stroke="#f4f7fb" stroke-width="1.8" stroke-linejoin="round"/>
    <rect x="286" y="600" width="750" height="6" rx="3" fill="#fff" fill-opacity="0.15"/>
    <rect x="363" y="600" width="540" height="6" rx="3" fill="#38bdf8"/>
    <rect x="359" y="592" width="8" height="22" rx="4" fill="#4fc3ff"/>
    <rect x="899" y="592" width="8" height="22" rx="4" fill="#4fc3ff"/>
    <line x1="698" y1="591" x2="698" y2="615" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

    <rect x="273" y="633" width="734" height="34" rx="7" fill="#111214" fill-opacity="0.9" stroke="#fff" stroke-opacity="0.1"/>
    <g transform="translate(283 640)" fill="none" stroke="#dbe5ea" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 2a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M4 10a6 6 0 0 0 12 0M10 16v4"/>
    </g>
    <rect x="319" y="647" width="630" height="6" rx="3" fill="#fff" fill-opacity="0.11"/>
    <rect x="319" y="647" width="428" height="6" rx="3" fill="url(#audio-level)"/>
    <g transform="translate(969 640)" fill="none" stroke="#dbe5ea" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8v5h4l5 4V3L6 8Z"/><path d="M14 7a4 4 0 0 1 0 6m2-8a7 7 0 0 1 0 10"/></g>
  </g>
</svg>
